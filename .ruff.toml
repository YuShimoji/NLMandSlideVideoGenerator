# Ruff Configuration
# Fast Python linter for errors, warnings, and import sorting

line-length = 120
target-version = "py311"

# Directory patterns to exclude
exclude = [
  ".git",
  "__pycache__",
  ".venv",
  "venv",
  ".eggs",
  "*.egg-info",
  "dist",
  "build",
]

[lint]
# Select rule categories:
# E = pycodestyle errors
# F = Pyflakes errors
# W = pycodestyle warnings
# I = isort (import sorting) - DISABLED due to circular import issues
select = ["E", "F", "W"]

# Ignore specific patterns to avoid conflicts with existing codebase
ignore = [
  "E501",  # Line too long (handled by formatter)
  "F401",  # Imported but unused - will clean up gradually
  "F841",  # Local variable assigned but never used - will clean up gradually
]
