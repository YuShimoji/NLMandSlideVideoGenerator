name: Research UI Smoke

on:
  push:
    branches: [master, main]
    paths:
      - ".github/workflows/research-ui-smoke.yml"
      - "requirements.txt"
      - "src/web/**"
      - "src/notebook_lm/**"
      - "tests/test_research_ui_playwright.py"
      - "tests/test_alignment_export.py"
      - "tests/test_script_alignment.py"
      - "tests/fixtures/research/**"
      - "scripts/smoke_research_ui_playwright.py"
  pull_request:
    branches: [master, main]
    paths:
      - ".github/workflows/research-ui-smoke.yml"
      - "requirements.txt"
      - "src/web/**"
      - "src/notebook_lm/**"
      - "tests/test_research_ui_playwright.py"
      - "tests/test_alignment_export.py"
      - "tests/test_script_alignment.py"
      - "tests/fixtures/research/**"
      - "scripts/smoke_research_ui_playwright.py"
  workflow_dispatch:

jobs:
  research-ui-smoke:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install chromium

      - name: Run Research UI smoke tests
        env:
          PYTHONPATH: .;src
          RESEARCH_UI_SMOKE_ARTIFACT_DIR: logs\\research_ui_smoke
        run: |
          python -m pytest -q tests/test_research_ui_playwright.py tests/test_alignment_export.py tests/test_script_alignment.py --tb=short

      - name: Upload smoke diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: research-ui-smoke-artifacts
          path: |
            output_csv/final_script_rp_playwright_smoke.csv
            logs/research_ui_smoke/**
          if-no-files-found: ignore
