name: .NET Build & Test

on:
  push:
    branches: [master, main]
    paths:
      - 'ymm4-plugin/**'
      - '.github/workflows/dotnet-build.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'ymm4-plugin/**'
  workflow_dispatch:

jobs:
  # Core project: YMM4非依存 — CI上でビルド+テスト可能
  core-test:
    name: Core Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build Core project
        run: dotnet build ymm4-plugin/NLMSlidePlugin.Core.csproj -c Release --nologo

      - name: Build test project
        run: dotnet build ymm4-plugin/tests/NLMSlidePlugin.Tests.csproj -c Release --nologo

      - name: Run tests
        run: dotnet test ymm4-plugin/tests/NLMSlidePlugin.Tests.csproj -c Release --nologo --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-test-results
          path: ymm4-plugin/tests/TestResults/test-results.trx
        continue-on-error: true

  # Main plugin: YMM4 DLLs required — CI上ではビルド不可
  plugin-build:
    name: Plugin Build (Optional)
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore ymm4-plugin/NLMSlidePlugin.csproj
        continue-on-error: true

      - name: Build plugin
        run: dotnet build ymm4-plugin/NLMSlidePlugin.csproj -c Release -p:SkipPluginCopy=true --nologo
        continue-on-error: true

      - name: Build status
        run: |
          echo "YMM4 DLLs not available in CI - plugin build is best-effort only"
