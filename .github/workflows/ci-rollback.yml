name: CI Failure Rollback

# Notification-only mode: creates an issue on CI failure but does NOT
# auto-revert. Auto-revert was too aggressive for trunk-based development,
# causing revert loops when CI env differs from local (e.g. mypy stubs).

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master, main]

jobs:
  notify:
    name: Notify on CI failure
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'push'
    permissions:
      issues: write

    steps:
      - name: Get failed commit info
        id: info
        run: |
          FAILED_SHA="${{ github.event.workflow_run.head_sha }}"
          echo "failed_sha=${FAILED_SHA}" >> $GITHUB_OUTPUT
          echo "failed_sha_short=${FAILED_SHA:0:7}" >> $GITHUB_OUTPUT
          echo "branch=${{ github.event.workflow_run.head_branch }}" >> $GITHUB_OUTPUT

      - name: Create failure notification issue
        uses: actions/github-script@v7
        with:
          script: |
            const failedSha = '${{ steps.info.outputs.failed_sha_short }}';
            const branch = '${{ steps.info.outputs.branch }}';
            const runUrl = '${{ github.event.workflow_run.html_url }}';

            const body = [
              `## CI Failure Report`,
              ``,
              `| Item | Value |`,
              `|------|-------|`,
              `| **Failed Commit** | \`${failedSha}\` |`,
              `| **Branch** | \`${branch}\` |`,
              `| **CI Run** | [View](${runUrl}) |`,
              ``,
              `CI failed for commit \`${failedSha}\` on \`${branch}\`. Please investigate and fix.`,
              ``,
              `> Auto-revert is disabled. If a rollback is needed, revert manually.`,
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `CI Failure: ${failedSha} on ${branch}`,
              body: body,
              labels: ['ci-failure'],
            });
