[mypy]
# Phase 1: Core modules only (TASK_021)
# Gradually expand to full codebase
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
check_untyped_defs = True
ignore_missing_imports = True

# Strict checking for core interfaces
[mypy-src.core.exceptions]
disallow_untyped_defs = True
warn_return_any = True

[mypy-src.core.interfaces]
disallow_untyped_defs = True
warn_return_any = True

[mypy-src.core.models]
disallow_untyped_defs = True
warn_return_any = True

# Exclude design/spec files from type checking
[mypy-api_spec_design]
ignore_errors = True
