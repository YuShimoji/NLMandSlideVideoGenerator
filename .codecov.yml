codecov:
  require_ci_to_pass: true
  allow_fallthroughs: false

coverage:
  precision: 2
  round: down
  range:
    - 70
    - 100

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false
  require_base: false
  show_carryforward_flags: true

parsers:
  gcov:
    branch_detection:
      conditional: yes
      loop: yes
      method: no
      macro: no

ignore:
  - "tests"
  - "test_*.py"
  - "*_test.py"
  - "venv"
  - ".venv"
  - "node_modules"
  - "ymm4-plugin"

flags:
  unittests:
    carryforward: true
    paths:
      - src
  integration:
    carryforward: false

gcov:
  branch_detection:
    conditional: yes
    loop: yes
    method: no
    macro: no

status:
  project:
    default:
      target: 70%
      threshold: 3%
      base: auto
      branches:
        - master
  patch:
    default:
      target: 70%
      threshold: 3%
  changes:
    default:
      base: auto
      branches:
        - master

# 除外パターン（src/内のコードのみ対象）
# tests/ ディレクトリは完全除外
