[pytest]
pythonpath = . src
norecursedirs = scripts .git venv node_modules desktop
addopts = -ra --ignore=test_log.txt -m "not integration"
python_files = test_*.py
filterwarnings =
    ignore::DeprecationWarning
markers =
    integration: 外部依存やE2E寄りの統合テスト（普段は除外して実行）
    slow: 実行に時間がかかるテスト
    asyncio: 非同期テスト
