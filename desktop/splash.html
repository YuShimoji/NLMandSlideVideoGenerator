<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Loading...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 480px;
      height: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
      color: #e0e0e0;
      font-family: 'Segoe UI', 'Meiryo UI', sans-serif;
      border-radius: 16px;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: drag;
    }

    .logo {
      font-size: 56px;
      margin-bottom: 16px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.08); opacity: 0.85; }
    }

    .title {
      font-size: 20px;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }

    .subtitle {
      font-size: 12px;
      color: #8888aa;
      margin-bottom: 32px;
    }

    .loader-container {
      width: 200px;
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .loader-bar {
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
      border-radius: 4px;
      animation: loading 1.5s ease-in-out infinite;
    }

    @keyframes loading {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }

    .status {
      font-size: 11px;
      color: #6666aa;
      animation: fadeInOut 2s ease-in-out infinite;
    }

    @keyframes fadeInOut {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .version {
      position: absolute;
      bottom: 12px;
      right: 16px;
      font-size: 10px;
      color: #444466;
    }
  </style>
</head>
<body>
  <div class="logo">🎬</div>
  <div class="title">NLM Slide Video Generator</div>
  <div class="subtitle">Desktop Edition</div>
  <div class="loader-container">
    <div class="loader-bar"></div>
  </div>
  <div class="status">サーバーを起動しています...</div>
  <div class="version">v1.0.0</div>
</body>
</html>
